<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Panel · Solpronet Audit</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f1f5f9; color: #0f172a; min-height: 100vh; }

    /* ── Login ── */
    #login {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .login-card {
      background: #fff; border-radius: 20px; padding: 40px;
      box-shadow: 0 8px 32px rgba(0,0,0,.10); width: 100%; max-width: 380px;
    }
    .login-logo { font-size: 28px; font-weight: 800; color: #1e40af; margin-bottom: 6px; }
    .login-sub  { font-size: 13px; color: #64748b; margin-bottom: 28px; }
    .login-card input {
      width: 100%; border: 1.5px solid #e2e8f0; border-radius: 12px;
      padding: 12px 16px; font-size: 15px; outline: none; margin-bottom: 14px;
      transition: border-color .15s;
    }
    .login-card input:focus { border-color: #3b82f6; }
    .login-card button {
      width: 100%; background: #2563eb; color: #fff; border: none;
      border-radius: 12px; padding: 13px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .login-card button:hover { background: #1d4ed8; }
    .login-err { color: #ef4444; font-size: 13px; margin-top: 10px; display: none; }

    /* ── Panel ── */
    #panel { display: none; }
    .topbar {
      background: #fff; border-bottom: 1px solid #e2e8f0;
      padding: 16px 28px; display: flex; align-items: center; gap: 16px;
    }
    .topbar-title { font-size: 17px; font-weight: 700; flex: 1; }
    .topbar-badge { font-size: 12px; color: #64748b; }
    .topbar-reload {
      background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 8px;
      padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
      color: #374151; transition: background .15s;
    }
    .topbar-reload:hover { background: #e2e8f0; }
    .topbar-logout {
      background: none; border: 1px solid #fca5a5; border-radius: 8px;
      padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
      color: #ef4444; transition: background .15s;
    }
    .topbar-logout:hover { background: #fef2f2; }

    .content { padding: 28px; max-width: 1100px; margin: 0 auto; }

    /* ── Stats ── */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat {
      background: #fff; border-radius: 16px; padding: 20px 24px;
      border: 1px solid #e2e8f0; box-shadow: 0 1px 4px rgba(0,0,0,.04);
    }
    .stat-n { font-size: 36px; font-weight: 800; line-height: 1; }
    .stat-l { font-size: 12px; color: #64748b; margin-top: 4px; font-weight: 500; }
    .stat.green .stat-n { color: #16a34a; }
    .stat.blue  .stat-n { color: #2563eb; }
    .stat.red   .stat-n { color: #dc2626; }
    .stat.gray  .stat-n { color: #475569; }

    /* ── Filtros ── */
    .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btn {
      padding: 7px 16px; border-radius: 99px; border: 1.5px solid #e2e8f0;
      font-size: 13px; font-weight: 600; cursor: pointer; background: #fff;
      color: #374151; transition: all .15s;
    }
    .filter-btn.active { border-color: #2563eb; background: #eff6ff; color: #1d4ed8; }

    /* ── Tabla ── */
    .table-wrap {
      background: #fff; border-radius: 16px; border: 1px solid #e2e8f0;
      overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.04);
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: #f8fafc; padding: 11px 16px; text-align: left;
      font-size: 11px; color: #64748b; font-weight: 700;
      text-transform: uppercase; letter-spacing: .6px;
      border-bottom: 1px solid #e2e8f0;
    }
    tbody td { padding: 12px 16px; border-top: 1px solid #f1f5f9; font-size: 13px; vertical-align: middle; }
    tbody tr:hover td { background: #fafafa; }
    .empty { text-align: center; padding: 48px; color: #94a3b8; font-size: 14px; }

    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 99px;
      font-size: 11px; font-weight: 700; line-height: 1.4;
    }
    .badge-lead  { background: #dcfce7; color: #15803d; }
    .badge-audit { background: #dbeafe; color: #1d4ed8; }
    .badge-error { background: #fee2e2; color: #dc2626; }

    .score { font-weight: 700; }
    .score-high { color: #16a34a; }
    .score-mid  { color: #d97706; }
    .score-low  { color: #dc2626; }

    .err-msg { color: #dc2626; font-size: 12px; }
    .ip-cell { font-family: monospace; font-size: 12px; color: #64748b; }
    .ts-cell { white-space: nowrap; color: #94a3b8; font-size: 12px; }

    .spinner {
      display: flex; align-items: center; justify-content: center;
      padding: 60px; color: #94a3b8; font-size: 14px; gap: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin-icon {
      width: 18px; height: 18px; border: 2px solid #e2e8f0;
      border-top-color: #3b82f6; border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @media (max-width: 600px) {
      .content { padding: 16px; }
      .topbar { padding: 14px 16px; }
      thead th:nth-child(3), tbody td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="login-logo">Solpronet</div>
    <div class="login-sub">Panel de auditorías · Acceso interno</div>
    <input type="password" id="token-input" placeholder="Token de acceso" autocomplete="current-password">
    <button onclick="doLogin()">Entrar</button>
    <div class="login-err" id="login-err">Token incorrecto. Inténtalo de nuevo.</div>
  </div>
</div>

<!-- PANEL -->
<div id="panel">
  <div class="topbar">
    <div class="topbar-title">Panel Solpronet Audit</div>
    <span class="topbar-badge" id="last-update"></span>
    <button class="topbar-reload" onclick="loadData()">↺ Actualizar</button>
    <button class="topbar-logout" onclick="doLogout()">Salir</button>
  </div>
  <div class="content">
    <div class="stats">
      <div class="stat green"><div class="stat-n" id="s-leads">—</div><div class="stat-l">Leads</div></div>
      <div class="stat blue" ><div class="stat-n" id="s-audits">—</div><div class="stat-l">Auditorías OK</div></div>
      <div class="stat red"  ><div class="stat-n" id="s-errors">—</div><div class="stat-l">Errores</div></div>
      <div class="stat gray" ><div class="stat-n" id="s-total">—</div><div class="stat-l">Total eventos</div></div>
    </div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">Todos</button>
      <button class="filter-btn" onclick="setFilter('lead', this)">Leads</button>
      <button class="filter-btn" onclick="setFilter('audit', this)">Auditorías</button>
      <button class="filter-btn" onclick="setFilter('error', this)">Errores</button>
    </div>
    <div class="table-wrap">
      <div class="spinner" id="spinner"><div class="spin-icon"></div> Cargando...</div>
      <table id="log-table" style="display:none">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Tipo</th>
            <th>IP</th>
            <th>Web / Nombre</th>
            <th>Detalle</th>
          </tr>
        </thead>
        <tbody id="log-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  let token = localStorage.getItem('sp_admin_token') || '';
  let allLog = [];
  let activeFilter = 'all';
  let autoRefresh;

  function fmt(ts) {
    return new Date(ts).toLocaleString('es-ES', { timeZone: 'Europe/Madrid', day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  function scoreClass(n) {
    if (n >= 7) return 'score-high';
    if (n >= 5) return 'score-mid';
    return 'score-low';
  }

  function renderTable(data) {
    const filtered = activeFilter === 'all' ? data : data.filter(e => e.type === activeFilter);
    const tbody = document.getElementById('log-body');

    if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="5" class="empty">Sin eventos de este tipo todavía</td></tr>`;
    } else {
      tbody.innerHTML = filtered.map(e => {
        const badge = e.type === 'lead'
          ? '<span class="badge badge-lead">LEAD</span>'
          : e.type === 'audit'
          ? '<span class="badge badge-audit">AUDIT</span>'
          : '<span class="badge badge-error">ERROR</span>';

        const detail = e.puntuacion != null
          ? `<span class="score ${scoreClass(e.puntuacion)}">${e.puntuacion}/10</span>`
          : e.msg
          ? `<span class="err-msg">${esc(e.msg)}</span>`
          : '—';

        return `<tr>
          <td class="ts-cell">${fmt(e.ts)}</td>
          <td>${badge}</td>
          <td class="ip-cell">${esc(e.ip ?? '—')}</td>
          <td>${esc(e.url ?? e.nombre ?? '—')}</td>
          <td>${detail}</td>
        </tr>`;
      }).join('');
    }

    document.getElementById('spinner').style.display = 'none';
    document.getElementById('log-table').style.display = 'table';
  }

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable(allLog);
  }

  async function loadData() {
    try {
      const res = await fetch(`/api/admin-data?token=${encodeURIComponent(token)}`);
      if (res.status === 401) { doLogout(); return; }
      const data = await res.json();
      if (!data.ok) return;

      allLog = data.log;
      const leads  = allLog.filter(e => e.type === 'lead').length;
      const audits = allLog.filter(e => e.type === 'audit').length;
      const errors = allLog.filter(e => e.type === 'error').length;

      document.getElementById('s-leads').textContent  = leads;
      document.getElementById('s-audits').textContent = audits;
      document.getElementById('s-errors').textContent = errors;
      document.getElementById('s-total').textContent  = allLog.length;
      document.getElementById('last-update').textContent = 'Actualizado: ' + fmt(new Date().toISOString());

      renderTable(allLog);
    } catch (e) {
      console.error(e);
    }
  }

  async function doLogin() {
    const input = document.getElementById('token-input');
    token = input.value.trim();
    const err = document.getElementById('login-err');
    err.style.display = 'none';

    try {
      const res = await fetch(`/api/admin-data?token=${encodeURIComponent(token)}`);
      if (res.status === 401) {
        err.style.display = 'block';
        return;
      }
      localStorage.setItem('sp_admin_token', token);
      document.getElementById('login').style.display = 'none';
      document.getElementById('panel').style.display = 'block';
      loadData();
      autoRefresh = setInterval(loadData, 60000);
    } catch (e) {
      err.textContent = 'Error de red. Inténtalo de nuevo.';
      err.style.display = 'block';
    }
  }

  function doLogout() {
    clearInterval(autoRefresh);
    localStorage.removeItem('sp_admin_token');
    token = '';
    document.getElementById('login').style.display = 'flex';
    document.getElementById('panel').style.display = 'none';
    document.getElementById('token-input').value = '';
    document.getElementById('spinner').style.display = 'flex';
    document.getElementById('log-table').style.display = 'none';
  }

  // Auto-login si hay token guardado
  if (token) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    loadData();
    autoRefresh = setInterval(loadData, 60000);
  }

  // Enter en el input
  document.getElementById('token-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
