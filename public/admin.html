<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Panel · Solpronet Audit</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f1f5f9; color: #0f172a; min-height: 100vh; -webkit-text-size-adjust: 100%; }

    /* ── LOGIN ── */
    #login { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .login-card {
      background: #fff; border-radius: 20px; padding: 36px 28px;
      box-shadow: 0 8px 32px rgba(0,0,0,.10); width: 100%; max-width: 360px;
    }
    .login-logo { font-size: 26px; font-weight: 800; color: #1e40af; margin-bottom: 4px; }
    .login-sub  { font-size: 13px; color: #64748b; margin-bottom: 24px; line-height: 1.4; }
    .login-card input {
      width: 100%; border: 1.5px solid #e2e8f0; border-radius: 12px;
      padding: 14px 16px; font-size: 16px; outline: none; margin-bottom: 12px;
      transition: border-color .15s; -webkit-appearance: none;
    }
    .login-card input:focus { border-color: #3b82f6; }
    .login-card button {
      width: 100%; background: #2563eb; color: #fff; border: none;
      border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: background .15s; -webkit-tap-highlight-color: transparent;
    }
    .login-card button:active { background: #1d4ed8; }
    .login-err { color: #ef4444; font-size: 13px; margin-top: 10px; display: none; }

    /* ── TOPBAR ── */
    #panel { display: none; }
    .topbar {
      background: #fff; border-bottom: 1px solid #e2e8f0;
      padding: 14px 20px; display: flex; align-items: center; gap: 10px;
      position: sticky; top: 0; z-index: 10;
    }
    .topbar-title { font-size: 16px; font-weight: 700; flex: 1; }
    .topbar-update { font-size: 11px; color: #94a3b8; display: none; }
    .topbar-btn {
      border-radius: 10px; border: 1px solid #e2e8f0; padding: 8px 14px;
      font-size: 13px; font-weight: 600; cursor: pointer; background: #f8fafc;
      color: #374151; transition: background .15s; white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .topbar-btn:active { background: #e2e8f0; }
    .topbar-btn.danger { border-color: #fca5a5; color: #ef4444; background: none; }
    .topbar-btn.danger:active { background: #fef2f2; }

    /* ── Widget toggle ── */
    .widget-bar {
      background: #fff; border-bottom: 1px solid #e2e8f0;
      padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .widget-status {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; font-weight: 600; flex: 1;
    }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
      transition: background .3s;
    }
    .status-dot.on  { background: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,.2); }
    .status-dot.off { background: #94a3b8; }
    .toggle-btn {
      padding: 9px 20px; border-radius: 10px; border: none;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: all .15s; -webkit-tap-highlight-color: transparent;
    }
    .toggle-btn.deactivate { background: #fee2e2; color: #dc2626; }
    .toggle-btn.deactivate:active { background: #fecaca; }
    .toggle-btn.activate   { background: #dcfce7; color: #16a34a; }
    .toggle-btn.activate:active   { background: #bbf7d0; }

    /* ── CONTENT ── */
    .content { padding: 20px 16px; max-width: 1100px; margin: 0 auto; }

    /* ── STATS ── */
    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
    .stat {
      background: #fff; border-radius: 14px; padding: 16px;
      border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 12px;
    }
    .stat-icon {
      width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .stat.green .stat-icon { background: #dcfce7; }
    .stat.blue  .stat-icon { background: #dbeafe; }
    .stat.red   .stat-icon { background: #fee2e2; }
    .stat.gray  .stat-icon { background: #f1f5f9; }
    .stat-info { min-width: 0; }
    .stat-n { font-size: 26px; font-weight: 800; line-height: 1; }
    .stat-l { font-size: 11px; color: #64748b; margin-top: 2px; font-weight: 500; }
    .stat.green .stat-n { color: #16a34a; }
    .stat.blue  .stat-n { color: #2563eb; }
    .stat.red   .stat-n { color: #dc2626; }
    .stat.gray  .stat-n { color: #475569; }

    /* ── FILTROS ── */
    .filters {
      display: flex; gap: 8px; margin-bottom: 14px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; padding-bottom: 2px;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      padding: 8px 18px; border-radius: 99px; border: 1.5px solid #e2e8f0;
      font-size: 13px; font-weight: 600; cursor: pointer; background: #fff;
      color: #374151; white-space: nowrap; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent; transition: all .15s;
    }
    .filter-btn.active { border-color: #2563eb; background: #eff6ff; color: #1d4ed8; }

    /* ── CARDS (móvil) ── */
    .cards { display: flex; flex-direction: column; gap: 10px; }
    .card {
      background: #fff; border-radius: 14px; border: 1px solid #e2e8f0;
      padding: 14px 16px;
    }
    .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .card-url { font-weight: 600; font-size: 14px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-detail { font-size: 13px; color: #374151; }
    .card-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 6px; }
    .card-ts { font-size: 11px; color: #94a3b8; }
    .card-ip { font-size: 11px; color: #94a3b8; font-family: monospace; }
    .card-err { font-size: 13px; color: #dc2626; margin-top: 4px; line-height: 1.4; }

    /* ── TABLE (desktop) ── */
    .table-wrap {
      background: #fff; border-radius: 16px; border: 1px solid #e2e8f0;
      overflow: hidden; display: none;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: #f8fafc; padding: 11px 16px; text-align: left;
      font-size: 11px; color: #64748b; font-weight: 700;
      text-transform: uppercase; letter-spacing: .6px;
      border-bottom: 1px solid #e2e8f0;
    }
    tbody td { padding: 12px 16px; border-top: 1px solid #f1f5f9; font-size: 13px; vertical-align: middle; }
    tbody tr:hover td { background: #fafafa; }
    .empty { text-align: center; padding: 48px; color: #94a3b8; font-size: 14px; }

    /* ── BADGES ── */
    .badge { display: inline-block; padding: 3px 9px; border-radius: 99px; font-size: 11px; font-weight: 700; line-height: 1.5; }
    .badge-lead  { background: #dcfce7; color: #15803d; }
    .badge-audit { background: #dbeafe; color: #1d4ed8; }
    .badge-error { background: #fee2e2; color: #dc2626; }

    .score { font-weight: 700; }
    .score-high { color: #16a34a; }
    .score-mid  { color: #d97706; }
    .score-low  { color: #dc2626; }
    .ip-cell { font-family: monospace; font-size: 12px; color: #64748b; }
    .ts-cell { white-space: nowrap; color: #94a3b8; font-size: 12px; }
    .err-msg { color: #dc2626; }

    /* ── SPINNER ── */
    .spinner { display: flex; align-items: center; justify-content: center; padding: 60px; color: #94a3b8; font-size: 14px; gap: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin-icon { width: 18px; height: 18px; border: 2px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin .7s linear infinite; }

    /* ── RESPONSIVE ── */
    @media (min-width: 700px) {
      .content { padding: 24px 28px; }
      .stats { grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
      .stat { padding: 18px 20px; }
      .stat-n { font-size: 32px; }
      .topbar { padding: 16px 28px; }
      .topbar-update { display: inline; }
      .cards { display: none; }
      .table-wrap { display: block; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="login-logo">Solpronet</div>
    <div class="login-sub">Panel de auditorías · Acceso interno</div>
    <input type="password" id="token-input" placeholder="Token de acceso" autocomplete="current-password">
    <button onclick="doLogin()">Entrar</button>
    <div class="login-err" id="login-err">Token incorrecto. Inténtalo de nuevo.</div>
  </div>
</div>

<!-- PANEL -->
<div id="panel">
  <div class="topbar">
    <div class="topbar-title">Solpronet Audit</div>
    <span class="topbar-update" id="last-update"></span>
    <button class="topbar-btn" onclick="loadData()">↺</button>
    <button class="topbar-btn danger" onclick="doLogout()">Salir</button>
  </div>
  <div class="widget-bar">
    <div class="widget-status">
      <div class="status-dot on" id="status-dot"></div>
      <span id="status-label">Chat activo en la web</span>
    </div>
    <button class="toggle-btn deactivate" id="toggle-btn" onclick="toggleWidget()">⏸ Desactivar chat</button>
  </div>
  <div class="content">
    <div class="stats">
      <div class="stat green"><div class="stat-icon">🎯</div><div class="stat-info"><div class="stat-n" id="s-leads">—</div><div class="stat-l">Leads</div></div></div>
      <div class="stat blue" ><div class="stat-icon">✅</div><div class="stat-info"><div class="stat-n" id="s-audits">—</div><div class="stat-l">Auditorías</div></div></div>
      <div class="stat red"  ><div class="stat-icon">⚠️</div><div class="stat-info"><div class="stat-n" id="s-errors">—</div><div class="stat-l">Errores</div></div></div>
      <div class="stat gray" style="cursor:pointer" onclick="window.open('https://console.anthropic.com/settings/billing','_blank')" title="Ver saldo en Anthropic Console">
        <div class="stat-icon">💰</div>
        <div class="stat-info">
          <div class="stat-n" id="s-cost">—</div>
          <div class="stat-l">Gasto sesión · <u>ver saldo</u></div>
        </div>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">Todos</button>
      <button class="filter-btn" onclick="setFilter('lead',this)">Leads</button>
      <button class="filter-btn" onclick="setFilter('audit',this)">Auditorías</button>
      <button class="filter-btn" onclick="setFilter('error',this)">Errores</button>
    </div>

    <!-- Cards (móvil) -->
    <div class="cards" id="cards-list">
      <div class="spinner"><div class="spin-icon"></div> Cargando...</div>
    </div>

    <!-- Tabla (desktop) -->
    <div class="table-wrap">
      <div class="spinner" id="spinner"><div class="spin-icon"></div> Cargando...</div>
      <table id="log-table" style="display:none">
        <thead>
          <tr><th>Fecha</th><th>Tipo</th><th>IP</th><th>Web / Nombre</th><th>Detalle</th></tr>
        </thead>
        <tbody id="log-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  let token          = localStorage.getItem('sp_admin_token') || '';
  let allLog         = [];
  let activeFilter   = 'all';
  let autoRefresh;
  let widgetIsOn     = true; // fuente de verdad del estado del widget

  const fmt = ts => new Date(ts).toLocaleString('es-ES', {
    timeZone: 'Europe/Madrid', day:'2-digit', month:'2-digit',
    hour:'2-digit', minute:'2-digit'
  });
  const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const scoreClass = n => n >= 7 ? 'score-high' : n >= 5 ? 'score-mid' : 'score-low';

  const badgeHtml = type => ({
    lead:    '<span class="badge badge-lead">LEAD</span>',
    audit:   '<span class="badge badge-audit">AUDIT</span>',
    error:   '<span class="badge badge-error">ERROR</span>',
    sistema: '<span class="badge" style="background:#f3f4f6;color:#6b7280">SYS</span>',
  })[type] ?? '<span class="badge">?</span>';

  const detailHtml = e => {
    if (e.puntuacion != null) {
      const cost = e.costUsd != null ? ` <span style="color:#94a3b8;font-size:11px;">$${e.costUsd.toFixed(4)}</span>` : '';
      return `<span class="score ${scoreClass(e.puntuacion)}">${e.puntuacion}/10</span>${cost}`;
    }
    return e.msg ? `<span class="err-msg">${esc(e.msg)}</span>` : '—';
  };

  function render(data) {
    const list = activeFilter === 'all' ? data : data.filter(e => e.type === activeFilter);
    const cardsList = document.getElementById('cards-list');
    const tbody     = document.getElementById('log-body');

    if (!list.length) {
      cardsList.innerHTML = '<div class="spinner" style="color:#94a3b8">Sin eventos todavía</div>';
      tbody.innerHTML = `<tr><td colspan="5" class="empty">Sin eventos todavía</td></tr>`;
    } else {
      cardsList.innerHTML = list.map(e => `
        <div class="card">
          <div class="card-top">
            ${badgeHtml(e.type)}
            <div class="card-url">${esc(e.url ?? e.nombre ?? e.msg ?? '—')}</div>
            <div class="card-detail">${detailHtml(e)}</div>
          </div>
          <div class="card-meta">
            <span class="card-ts">${fmt(e.ts)}</span>
            ${e.ip ? `<span class="card-ip">· ${esc(e.ip)}</span>` : ''}
          </div>
          ${e.type === 'error' && e.msg ? `<div class="card-err">${esc(e.msg)}</div>` : ''}
        </div>`).join('');

      tbody.innerHTML = list.map(e => `<tr>
        <td class="ts-cell">${fmt(e.ts)}</td>
        <td>${badgeHtml(e.type)}</td>
        <td class="ip-cell">${esc(e.ip ?? '—')}</td>
        <td>${esc(e.url ?? e.nombre ?? '—')}</td>
        <td>${detailHtml(e)}</td>
      </tr>`).join('');
    }

    document.getElementById('spinner').style.display = 'none';
    document.getElementById('log-table').style.display = 'table';
  }

  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(allLog);
  }

  function applyWidgetStatus(enabled) {
    widgetIsOn = enabled;
    document.getElementById('status-dot').className  = 'status-dot ' + (enabled ? 'on' : 'off');
    document.getElementById('status-label').textContent = enabled ? 'Chat activo en la web' : 'Chat desactivado';
    const btn = document.getElementById('toggle-btn');
    btn.className   = 'toggle-btn ' + (enabled ? 'deactivate' : 'activate');
    btn.textContent = enabled ? '⏸ Desactivar chat' : '▶ Activar chat';
  }

  async function toggleWidget() {
    const btn      = document.getElementById('toggle-btn');
    const newState = !widgetIsOn; // invertir el estado conocido
    btn.disabled   = true;
    btn.textContent = 'Aplicando…';
    try {
      const res = await fetch(`/api/admin-toggle?token=${encodeURIComponent(token)}`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ enabled: newState }),
      });
      if (!res.ok) throw new Error('Error ' + res.status);
      const data = await res.json();
      applyWidgetStatus(data.enabled);
      loadData();
    } catch (err) {
      alert('No se pudo cambiar el estado del chat: ' + err.message);
      applyWidgetStatus(widgetIsOn); // revertir UI
    }
    btn.disabled = false;
  }

  async function loadData() {
    try {
      const res = await fetch(`/api/admin-data?token=${encodeURIComponent(token)}`);
      if (res.status === 401) { doLogout(); return; }
      const data = await res.json();
      if (!data.ok) return;

      allLog = data.log;
      applyWidgetStatus(data.widgetEnabled !== false);

      const leads     = allLog.filter(e => e.type === 'lead').length;
      const audits    = allLog.filter(e => e.type === 'audit').length;
      const errors    = allLog.filter(e => e.type === 'error').length;
      const totalCost = allLog
        .filter(e => e.type === 'audit' && e.costUsd != null)
        .reduce((acc, e) => acc + e.costUsd, 0);

      document.getElementById('s-leads').textContent  = leads;
      document.getElementById('s-audits').textContent = audits;
      document.getElementById('s-errors').textContent = errors;
      document.getElementById('s-cost').textContent   = '$' + totalCost.toFixed(4);
      document.getElementById('last-update').textContent = fmt(new Date().toISOString());

      render(allLog);
    } catch (e) { console.error(e); }
  }

  async function doLogin() {
    const input = document.getElementById('token-input');
    token = input.value.trim();
    const errEl = document.getElementById('login-err');
    errEl.style.display = 'none';
    try {
      const res = await fetch(`/api/admin-data?token=${encodeURIComponent(token)}`);
      if (res.status === 401) { errEl.style.display = 'block'; return; }
      localStorage.setItem('sp_admin_token', token);
      document.getElementById('login').style.display = 'none';
      document.getElementById('panel').style.display = 'block';
      loadData();
      autoRefresh = setInterval(loadData, 60000);
    } catch (e) {
      errEl.textContent = 'Error de red. Inténtalo de nuevo.';
      errEl.style.display = 'block';
    }
  }

  function doLogout() {
    clearInterval(autoRefresh);
    localStorage.removeItem('sp_admin_token');
    token = '';
    document.getElementById('login').style.display = 'flex';
    document.getElementById('panel').style.display = 'none';
    document.getElementById('token-input').value = '';
  }

  if (token) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    loadData();
    autoRefresh = setInterval(loadData, 60000);
  }

  document.getElementById('token-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
